<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Band Kit</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">

<script defer src="script.js"></script>

</head>
<body>

<!-- ========================= -->
<!-- 初回セットアップ -->
<!-- ========================= -->

<div id="setup-screen">

    <div class="setup-card">

        <div class="app-logo">
            <span class="material-symbols-rounded">
                music_note
            </span>
        </div>

        <h1>Band Kit</h1>

        <p>Select Language</p>

        <div class="language-list">

            <label class="radio-card">

                <input
                    type="radio"
                    name="language"
                    value="ja"
                    checked
                >

                <span>日本語</span>

            </label>

            <label class="radio-card">

                <input
                    type="radio"
                    name="language"
                    value="en"
                >

                <span>English</span>

            </label>

        </div>

        <button id="setup-continue">
            Continue
        </button>

    </div>

</div>

<!-- ========================= -->
<!-- メインアプリ -->
<!-- ========================= -->

<div id="app" class="hidden">

    <!-- ヘッダー -->

    <header>

        <div class="header-left">

            <span class="material-symbols-rounded">
                music_note
            </span>

            <h1>Band Kit</h1>

        </div>

    </header>

    <!-- タブ -->

    <nav id="tabs">

        <button class="tab active" data-page="metronome">

            <span class="material-symbols-rounded">
                timer
            </span>

            <span>Metronome</span>

        </button>

        <button class="tab" data-page="tuner">

            <span class="material-symbols-rounded">
                tune
            </span>

            <span>Tuner</span>

        </button>

        <button class="tab" data-page="pitch">

            <span class="material-symbols-rounded">
                graphic_eq
            </span>

            <span>Pitch</span>

        </button>

        <button class="tab" data-page="piano">

            <span class="material-symbols-rounded">
                piano
            </span>

            <span>Piano</span>

        </button>

        <button class="tab" data-page="score" disabled>

            <span class="material-symbols-rounded">
                close
            </span>

            <span>Disabled</span>

        </button>

        <button class="tab" data-page="noise">

            <span class="material-symbols-rounded">
                mic
            </span>

            <span>Noise</span>

        </button>

        <button class="tab" data-page="settings">

            <span class="material-symbols-rounded">
                settings
            </span>

            <span>Settings</span>

        </button>

    </nav>

    <!-- コンテンツ -->

    <main>

        <!-- ================= -->
        <!-- メトロノーム -->
        <!-- ================= -->

        <section
            id="page-metronome"
            class="page active">

            <div class="card">

                <h2>Metronome</h2>

                <div class="form-group">

                    <label>BPM</label>

                    <input
                        type="number"
                        id="bpm"
                        min="20"
                        max="300"
                        value="120"
                    >

                </div>

                <div class="form-group">


                        

                </div>

                <div class="form-group">

                    <label>Beats</label>

                    <select id="beats">
    <option value="4/4">4/4</option>
    <option value="3/4">3/4</option>
    <option value="6/8">6/8</option>
</select>

                </div>

                <div class="form-group">

                    <label>Display</label>

                    <select id="display-mode">

                        <option value="lr">
                            L-R
                        </option>

                        <option value="beat">
                            Beat
                        </option>

                    </select>

                </div>

                <button id="start-metronome">
				
                    <span class="material-symbols-rounded">
                        play_arrow
                    </span>

                    Start

                </button>
<div id="metro-lr">
    <div id="metro-needle"></div>
</div>

<div id="metro-beat-view"></div>

<div id="metro-status">
    <div id="metro-current">停止中</div>
    <div id="metro-measure">小節: 1</div>
    <div id="metro-total">総拍数: 0</div>
</div>
            </div>

        </section>

        <!-- ================= -->
        <!-- チューナー -->
        <!-- ================= -->

        <section
            id="page-tuner"
            class="page">

            <div class="card">

                <h2>Tuner</h2>

                <div class="big-display">

                    --

                </div>

                <p>Waiting for microphone...</p>
				<div id="tuner-meter">
    <div id="tuner-center"></div>
    <div id="tuner-needle"></div>
</div>
<button id="retune-btn">再検知</button>
            </div>

        </section>

        <!-- ================= -->
        <!-- 音検知 -->
        <!-- ================= -->

        <section
            id="page-pitch"
            class="page">

            <div class="card">

                <h2>Pitch Detection</h2>

                <div class="big-display">

                    --

                </div>

            </div>

        </section>

        <!-- ================= -->
        <!-- Pianoshock 2 -->
        <!-- ================= -->

        <section
            id="page-piano"
            class="page">

            <div class="card iframe-card">

                <iframe
                    src="https://ayatocraft.github.io/pianoshock2"
                    title="Pianoshock 2">
                </iframe>

            </div>

        </section>

        <!-- ================= -->
        <!-- Music Score -->
        <!-- ================= -->

        <section
            id="page-score"
            class="page">

            <div class="card">

                <h2>Music Score</h2>

                <div class="score-modes">

                    <button>
                        Read Score
                    </button>

                    <button>
                        MIDI to Score
                    </button>

                    <button>
                        Player
                    </button>

                </div>

            </div>

        </section>

        <!-- ================= -->
        <!-- Noise -->
        <!-- ================= -->

        <section
            id="page-noise"
            class="page">

            <div class="card">

                <h2>Noise Meter</h2>

                <div
                    class="big-display"
                    id="db-display">

                    0 dB

                </div>

                <progress
                    value="0"
                    max="150">
                </progress>

            </div>

        </section>

        <!-- ================= -->
        <!-- Settings -->
        <!-- ================= -->

        <section
            id="page-settings"
            class="page">

            <div class="card">

                <h2>Settings</h2>

                <button id="change-language">

                    <span class="material-symbols-rounded">
                        language
                    </span>

                    Language

                </button>

                <button id="reset-app">

                    <span class="material-symbols-rounded">
                        restart_alt
                    </span>

                    Reset

                </button>

            </div>

        </section>

    </main>

</div>

</body>
</html>
